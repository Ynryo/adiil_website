services:
  web:
    build: .
    container_name: adiil-web
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: adiil-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: adiil
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./adiil_website/script.sql:/tmp/script.sql
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  db_data:
